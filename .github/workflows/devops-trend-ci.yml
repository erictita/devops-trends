on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: Build
        run: mvn clean compile
      - name: Test
        run: mvn test
      - name: Package
        run: mvn package -DskipTests
      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-trends-war
          path: target/devops-trends.war